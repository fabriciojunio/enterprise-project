version: '3.9'

services:
  # ─── Backend API ─────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
      target: production
    container_name: enterprise_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enterprise_network
    volumes:
      - api_logs:/app/logs
      - api_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp

  # ─── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: production
    container_name: enterprise_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - enterprise_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    security_opt:
      - no-new-privileges:true

  # ─── PostgreSQL Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: enterprise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-enterprise_db}
      POSTGRES_USER: ${DB_USER:-enterprise_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - enterprise_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-enterprise_user} -d ${DB_NAME:-enterprise_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    command:
      - "postgres"
      - "-c"
      - "ssl=off"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_duration=off"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "max_connections=200"

  # ─── Redis Cache ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite no
      --save 900 1
      --save 300 10
      --save 60 10000
      --loglevel warning
      --protected-mode yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - enterprise_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: enterprise_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - enterprise_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
    security_opt:
      - no-new-privileges:true

# ─── Networks ───────────────────────────────────────────────────────
networks:
  enterprise_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ─── Volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local
  api_uploads:
    driver: local
  nginx_logs:
    driver: local
